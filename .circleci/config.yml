version: 3

variables:
  ubuntu-2404: &ubuntu-2404
    docker:
      - image: ghcr.io/mrchemsoft/metamr/circleci_ubuntu-24.04:sha-2b5887e
        name: tsubame
        user: merzbow
    working_directory: ~/mrchem
  configure-serial: &configure-serial
    run:
      name: Configuring serial
      shell: /bin/bash
      command: |
        python setup \
          --type=release \
          --cxx=g++ \
          --prefix=$HOME/Software/MRChem
  configure-omp: &configure-omp
    run:
      name: Configuring OpenMP parallel
      shell: /bin/bash
      command: |
        python setup \
          --type=release \
          --cxx=g++ \
          --omp \
          --prefix=$HOME/Software/MRChem-omp
  configure-mpi: &configure-mpi
    run:
      name: Configuring MPI parallel
      shell: /bin/bash
      command: |
        python setup \
          --type=release \
          --cxx=mpicxx \
          --mpi \
          --prefix=$HOME/Software/MRChem-mpi
  build: &build
    run:
      name: Building and installing
      shell: /bin/bash
      command: |
        cmake --build build --target install -- VERBOSE=1 -j4
  tests: &tests
      - run: mkdir -p test-results
      - run:
          name: Testing
          command: |
            ctest -N \
              | sed -n 's/.*Test #[0-9]\+: \(.*\)/\1/p' \
              | circleci tests run \
                --command='tr "\n" "|" | sed "s/|$//" | xargs -I {} ctest --verbose --output-on-failure -R "{}"' \
                --split-by=timings \
                --verbose
      - store_test_results:
          path: test-results


jobs:
  build-serial:
    <<: *ubuntu-2404
    steps:
      - checkout:
         method: blobless
      - *configure-serial
      - *build
      - persist_to_workspace:
          root: ~/mrchem
          paths:
            - .

  build-omp:
    <<: *ubuntu-2404
    steps:
      - checkout:
         method: blobless
      - *configure-omp
      - *build
      - persist_to_workspace:
          root: ~/mrchem
          paths:
            - .

  build-mpi:
    <<: *ubuntu-2404
    steps:
      - checkout:
         method: blobless
      - *configure-mpi
      - *build
      - persist_to_workspace:
          root: ~/mrchem
          paths:
            - .
    
  ###############################

  test-serial:
    <<: *ubuntu-2404
    parallelism: 4
    steps:
      - attach_workspace:
          at: ~/mrchem
      - *tests

  test-omp:
    <<: *ubuntu-2404
    parallelism: 4
    environment:
      - OMP_NUM_THREADS: '4'
    steps:
      - attach_workspace:
          at: ~/mrchem
      - *tests
    
  test-mpi:
    <<: *ubuntu-2404
    parallelism: 4
    steps:
      - attach_workspace:
          at: ~/mrchem
      - *tests

workflows:
  version: 3
  build-and-test:
    jobs:
      - build-serial  
      - test-serial:
          requires:
            - build-serial
      - build-omp
      - test-omp:
          requires:
            - build-omp
      - build-mpi
      - test-mpi:
          requires:
            - build-mpi